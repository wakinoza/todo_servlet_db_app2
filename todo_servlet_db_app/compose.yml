version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: db.Dockerfile
    container_name: todo-db
    environment:
      - MYSQL_RANDOM_ROOT_PASSWORD=yes
      - MYSQL_DATABASE=${DB_NAME}
      - DB_USER_READONLY=${DB_USER_READONLY}
      - DB_PASSWORD_READONLY=${DB_PASSWORD_READONLY}
      - DB_USER_WRITEONLY=${DB_USER_WRITEONLY}
      - DB_PASSWORD_WRITEONLY=${DB_PASSWORD_WRITEONLY}
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/tmp/init.sql.template:ro
    ports:
      - "3307:3306"
    command: >
      sh -c "envsubst < /tmp/init.sql.template > /docker-entrypoint-initdb.d/init.sql && 
             exec docker-entrypoint.sh mysqld"

  app:
    build: .
    container_name: todo-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER_READONLY=${DB_USER_READONLY}
      - DB_PASSWORD_READONLY=${DB_PASSWORD_READONLY}
      - DB_USER_WRITEONLY=${DB_USER_WRITEONLY}
      - DB_PASSWORD_WRITEONLY=${DB_PASSWORD_WRITEONLY}
    depends_on:
      - db

volumes:
  db_data: